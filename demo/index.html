<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebSocket Tester – with dedicated Receive Panel</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 1200px;
      margin: 2rem auto;
      padding: 1rem;
      background: #f0f2f5;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 1.2rem;
    }
    .full-width {
      grid-column: span 2;
    }
    h2 {
      margin-top: 0;
      font-size: 1.3rem;
      border-bottom: 2px solid #e9ecef;
      padding-bottom: 0.5rem;
    }
    .status {
      padding: 0.5rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-weight: bold;
      text-align: center;
    }
    .connected { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .disconnected { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .connecting { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .flex-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    input, select, button {
      padding: 0.5rem;
      font-size: 0.9rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:disabled {
      background: #6c757d;
      cursor: not-allowed;
    }
    .message-box {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      height: 250px;
      overflow-y: auto;
      padding: 0.5rem;
      font-family: monospace;
      font-size: 0.85rem;
    }
    .received-item {
      border-left: 3px solid #28a745;
      padding-left: 0.5rem;
      margin: 0.5rem 0;
      background: #e9f5e9;
    }
    .log-item {
      border-bottom: 1px solid #eee;
      margin: 0.3rem 0;
      color: #495057;
    }
    hr { margin: 1rem 0; }
    label { font-weight: 600; width: 80px; }
  </style>
</head>
<body>
<div class="container">
  <div class="card full-width">
    <h1>🔌 WebSocket Tester – with Receive Panel</h1>
    <div id="status" class="status disconnected">⚫ Disconnected</div>
    <div class="flex-row">
      <label>URL:</label>
      <input type="text" id="wsUrl" value="ws://localhost:8000/ws" style="flex: 3;">
      <button id="connectBtn">🔗 Connect</button>
      <button id="disconnectBtn" disabled>🔌 Disconnect</button>
    </div>
  </div>

  <div class="card">
    <h2>📤 Send Message</h2>
    <div class="flex-row">
      <label>Text:</label>
      <input type="text" id="textMsg" placeholder="Plain text" style="flex: 2;">
      <button id="sendTextBtn" disabled>Send Text</button>
    </div>
    <div class="flex-row">
      <label>JSON:</label>
      <input type="text" id="jsonMsg" value='{"type":"ping"}' style="flex: 2;">
      <button id="sendJsonBtn" disabled>Send JSON</button>
    </div>
    <div class="flex-row">
      <label>Room:</label>
      <input type="text" id="roomName" placeholder="room_id" style="flex: 1;">
      <button id="joinRoomBtn" disabled>Join Room</button>
      <button id="leaveRoomBtn" disabled>Leave Room</button>
    </div>
  </div>

  <div class="card">
    <h2>📥 Received Messages <span style="font-size:0.8rem; font-weight:normal;">(only incoming data)</span></h2>
    <div id="receivedBox" class="message-box">
      <div style="color:#6c757d;">No messages received yet...</div>
    </div>
  </div>

  <div class="card full-width">
    <h2>📜 Event Log</h2>
    <div id="logBox" class="message-box" style="height: 150px;">
      <div>Ready. Click Connect.</div>
    </div>
  </div>
</div>

<script>
  let socket = null;

  // DOM elements
  const statusDiv = document.getElementById('status');
  const wsUrlInput = document.getElementById('wsUrl');
  const connectBtn = document.getElementById('connectBtn');
  const disconnectBtn = document.getElementById('disconnectBtn');
  const sendTextBtn = document.getElementById('sendTextBtn');
  const sendJsonBtn = document.getElementById('sendJsonBtn');
  const joinRoomBtn = document.getElementById('joinRoomBtn');
  const leaveRoomBtn = document.getElementById('leaveRoomBtn');
  const textMsgInput = document.getElementById('textMsg');
  const jsonMsgInput = document.getElementById('jsonMsg');
  const roomNameInput = document.getElementById('roomName');
  const receivedBox = document.getElementById('receivedBox');
  const logBox = document.getElementById('logBox');

  function addLog(message, isError = false) {
    const div = document.createElement('div');
    div.className = 'log-item';
    div.style.color = isError ? '#dc3545' : '#495057';
    div.textContent = new Date().toLocaleTimeString() + ' - ' + message;
    logBox.appendChild(div);
    logBox.scrollTop = logBox.scrollHeight;
  }

  function addReceived(data) {
    const div = document.createElement('div');
    div.className = 'received-item';
    div.innerHTML = `<strong>📥 ${new Date().toLocaleTimeString()}</strong><br><pre style="margin:0; white-space:pre-wrap;">${escapeHtml(data)}</pre>`;
    receivedBox.appendChild(div);
    receivedBox.scrollTop = receivedBox.scrollHeight;
    // remove placeholder if exists
    if (receivedBox.children.length === 1 && receivedBox.children[0].innerText.includes('No messages received')) {
      receivedBox.innerHTML = '';
    }
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function setConnected(connected) {
    if (connected) {
      statusDiv.className = 'status connected';
      statusDiv.innerHTML = '🟢 Connected';
      connectBtn.disabled = true;
      disconnectBtn.disabled = false;
      sendTextBtn.disabled = false;
      sendJsonBtn.disabled = false;
      joinRoomBtn.disabled = false;
      leaveRoomBtn.disabled = false;
      wsUrlInput.disabled = true;
    } else {
      statusDiv.className = 'status disconnected';
      statusDiv.innerHTML = '⚫ Disconnected';
      connectBtn.disabled = false;
      disconnectBtn.disabled = true;
      sendTextBtn.disabled = true;
      sendJsonBtn.disabled = true;
      joinRoomBtn.disabled = true;
      leaveRoomBtn.disabled = true;
      wsUrlInput.disabled = false;
    }
  }

  function connect() {
    if (socket && socket.readyState === WebSocket.OPEN) {
      addLog('Already connected', false);
      return;
    }
    let url = wsUrlInput.value.trim();
    if (!url) {
      addLog('Please enter a WebSocket URL', true);
      return;
    }
    statusDiv.className = 'status connecting';
    statusDiv.innerHTML = '🟡 Connecting...';
    connectBtn.disabled = true;
    addLog(`Connecting to ${url}...`);

    try {
      socket = new WebSocket(url);
      socket.onopen = () => {
        addLog('✅ Connection established');
        setConnected(true);
      };
      socket.onmessage = (event) => {
        let data = event.data;
        // try to pretty-print JSON
        try {
          let parsed = JSON.parse(data);
          data = JSON.stringify(parsed, null, 2);
        } catch(e) {}
        addReceived(data);
      };
      socket.onerror = (err) => {
        addLog(`WebSocket error: ${err.type}`, true);
      };
      socket.onclose = (event) => {
        let reason = event.reason || 'No reason';
        addLog(`Connection closed. Code: ${event.code}, Reason: ${reason}`, true);
        setConnected(false);
        socket = null;
      };
    } catch (err) {
      addLog(`Failed to create WebSocket: ${err.message}`, true);
      setConnected(false);
    }
  }

  function disconnect() {
    if (socket) {
      socket.close(1000, 'User disconnected');
      socket = null;
    }
    setConnected(false);
  }

  function sendText() {
    if (!socket || socket.readyState !== WebSocket.OPEN) {
      addLog('Not connected', true);
      return;
    }
    let msg = textMsgInput.value.trim();
    if (msg === '') {
      addLog('Empty text message', true);
      return;
    }
    socket.send(msg);
    addLog(`Sent text: ${msg}`);
    textMsgInput.value = '';
  }

  function sendJson() {
    if (!socket || socket.readyState !== WebSocket.OPEN) {
      addLog('Not connected', true);
      return;
    }
    let raw = jsonMsgInput.value.trim();
    if (raw === '') {
      addLog('Empty JSON', true);
      return;
    }
    try {
      let obj = JSON.parse(raw);
      socket.send(JSON.stringify(obj));
      addLog(`Sent JSON: ${raw}`);
    } catch(e) {
      addLog(`Invalid JSON: ${e.message}`, true);
    }
  }

  function joinRoom() {
    let room = roomNameInput.value.trim();
    if (!room) {
      addLog('Enter room name', true);
      return;
    }
    // This assumes your FastAPI module expects a command like { "action": "join", "room": room }
    // Adjust according to your actual API.
    sendCustomCommand('join', room);
  }

  function leaveRoom() {
    let room = roomNameInput.value.trim();
    if (!room) {
      addLog('Enter room name', true);
      return;
    }
    sendCustomCommand('leave', room);
  }

  function sendCustomCommand(action, room) {
    if (!socket || socket.readyState !== WebSocket.OPEN) {
      addLog('Not connected', true);
      return;
    }
    const msg = JSON.stringify({ action: action, room: room });
    socket.send(msg);
    addLog(`Sent ${action} room: ${room}`);
  }

  // Event listeners
  connectBtn.addEventListener('click', connect);
  disconnectBtn.addEventListener('click', disconnect);
  sendTextBtn.addEventListener('click', sendText);
  sendJsonBtn.addEventListener('click', sendJson);
  joinRoomBtn.addEventListener('click', joinRoom);
  leaveRoomBtn.addEventListener('click', leaveRoom);
</script>
</body>
</html>
